<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Profesional de Asistencia</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- LOGIN -->
<div id="login" class="flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded-2xl shadow-xl w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Acceso Seguro</h2>
    <input id="email" placeholder="Usuario" class="border p-2 mb-2 w-full rounded" />
    <input id="password" type="password" placeholder="Clave" class="border p-2 mb-4 w-full rounded" />
    <button onclick="login()" class="bg-blue-600 hover:bg-blue-700 text-white w-full py-2 rounded">Ingresar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden p-4">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">Control de Asistencia</h1>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">Salir</button>
  </div>

  <div class="flex gap-2 mb-4">
    <button onclick="addRow()" class="bg-green-500 text-white px-4 py-2 rounded">➕ Agregar</button>
    <button onclick="exportExcel()" class="bg-indigo-500 text-white px-4 py-2 rounded">📥 Exportar</button>
  </div>

  <div class="overflow-x-auto bg-white rounded-xl shadow">
    <table class="min-w-full text-sm">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2">Nombre</th>
          <script>
            for (let i = 1; i <= 15; i++) {
              document.write(`<th class='p-2'>${i}</th>`);
            }
          </script>
          <th>Comentario</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>
</div>

<script>
const supabase = window.supabase.createClient("https://YOUR_URL.supabase.co", "YOUR_ANON_KEY");

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) return alert("Acceso denegado");

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  fetchData();
  realtime();
}

function logout(){
  supabase.auth.signOut();
  location.reload();
}

async function fetchData() {
  const { data } = await supabase.from("asistencia").select("*").order("nombre");
  render(data);
}

function render(data) {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(row => {
    let tr = `<tr class='border hover:bg-gray-50'>
      <td class='p-1'><input class='w-full' value='${row.nombre || ""}' onchange="updateField('${row.id}','nombre',this.value)"></td>`;

    for (let i = 1; i <= 15; i++) {
      const val = row[`dia${i}`] || 'N';
      const color = val === 'Y' ? 'bg-green-200' : 'bg-red-200';

      tr += `
      <td class='${color}'>
        <select class='w-full bg-transparent' onchange="updateField('${row.id}','dia${i}',this.value)">
          <option ${val==='Y'?'selected':''}>Y</option>
          <option ${val==='N'?'selected':''}>N</option>
        </select>
      </td>`;
    }

    tr += `
      <td class='relative group'>
        <input class='w-full' value='${row.comentario || ""}' onchange="updateField('${row.id}','comentario',this.value)">
        ${row.comentario ? `<div class='absolute hidden group-hover:block bg-black text-white text-xs p-2 rounded -top-10'>${row.comentario}</div>` : ''}
      </td>
      <td>
        <button onclick="deleteRow('${row.id}')" class="bg-red-500 text-white px-2 py-1 rounded">❌</button>
      </td>
    </tr>`;

    tabla.innerHTML += tr;
  });
}

async function updateField(id, field, value) {
  await supabase.from("asistencia").update({ [field]: value }).eq("id", id);
}

async function deleteRow(id) {
  if(confirm("¿Eliminar registro?")){
    await supabase.from("asistencia").delete().eq("id", id);
  }
}

async function addRow() {
  await supabase.from("asistencia").insert([{ nombre: "Nuevo" }]);
}

function realtime() {
  supabase.channel('asistencia')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'asistencia' }, () => {
      fetchData();
    })
    .subscribe();
}

function exportExcel(){
  let table = document.querySelector("table").outerHTML;
  let blob = new Blob([table], { type: "application/vnd.ms-excel" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "asistencia.xls";
  a.click();
}
</script>

</body>
</html>
