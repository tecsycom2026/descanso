<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Asistencia</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="p-4">
  <h1 class="text-2xl font-bold mb-4">Control de Asistencia</h1>

  <div class="flex gap-2 mb-4">
    <button onclick="addRow()" class="bg-green-500 text-white px-4 py-2 rounded">➕ Agregar</button>
    <button onclick="exportExcel()" class="bg-indigo-500 text-white px-4 py-2 rounded">📥 Exportar</button>
  </div>

  <div class="overflow-x-auto bg-white rounded-xl shadow">
    <table class="min-w-full text-sm">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2">Rol</th>
          <th class="p-2">Partner</th>
          <th class="p-2">Nombre</th>
          <th class="p-2">Zona</th>
          <th>L</th>
          <th>M</th>
          <th>Mi</th>
          <th>J</th>
          <th>V</th>
          <th>S</th>
          <th>D</th>
          <th>Comentario</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://jxpeztieqwotfgswhzhx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4cGV6dGllcXdvdGZnc3doemh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MzQ4MDQsImV4cCI6MjA4NjQxMDgwNH0.Hf-lbGlP2OmH7Uh2LNKqwHkwHDp7yQV6O73aXw5NCZk"
);

const dias = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];

async function fetchData() {
  const { data, error } = await supabase.from("asistencia").select("*").order("nombre");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  render(data || []);
}

function render(data) {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(row => {

    let tr = `<tr class='border hover:bg-gray-50'>
      <td><input value='${row.rol || ""}' onchange="updateField('${row.id}','rol',this.value)"></td>
      <td><input value='${row.partner || ""}' onchange="updateField('${row.id}','partner',this.value)"></td>
      <td><input value='${row.nombre || ""}' onchange="updateField('${row.id}','nombre',this.value)"></td>
      <td><input value='${row.zona || ""}' onchange="updateField('${row.id}','zona',this.value)"></td>
    `;

    dias.forEach(dia => {
      const val = row[dia] || 'N';
      const color = val === 'Y' ? 'bg-green-200' : 'bg-red-200';

      tr += `
      <td class='${color}'>
        <select onchange="updateField('${row.id}','${dia}',this.value)">
          <option value="Y" ${val==='Y'?'selected':''}>Y</option>
          <option value="N" ${val==='N'?'selected':''}>N</option>
        </select>
      </td>`;
    });

    tr += `
      <td class='relative group'>
        <input value='${row.comentario || ""}' onchange="updateField('${row.id}','comentario',this.value)">
        ${row.comentario ? `<div class='absolute hidden group-hover:block bg-black text-white text-xs p-2 rounded -top-10'>${row.comentario}</div>` : ''}
      </td>

      <td>
        <button onclick="deleteRow('${row.id}')" class="bg-red-500 text-white px-2 py-1 rounded">❌</button>
      </td>
    </tr>`;

    tabla.innerHTML += tr;
  });
}

async function updateField(id, field, value) {
  await supabase.from("asistencia").update({ [field]: value }).eq("id", id);
}

async function deleteRow(id) {
  if(confirm("¿Eliminar registro?")){
    await supabase.from("asistencia").delete().eq("id", id);
  }
}

async function addRow() {
  await supabase.from("asistencia").insert([{
    nombre: "Nuevo",
    rol: "",
    partner: "",
    zona: ""
  }]);
}

function exportExcel(){
  let table = document.querySelector("table").outerHTML;
  let blob = new Blob([table], { type: "application/vnd.ms-excel" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "asistencia.xls";
  a.click();
}

function realtime() {
  supabase.channel('asistencia')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'asistencia' }, () => {
      fetchData();
    })
    .subscribe();
}

fetchData();
realtime();
</script>

</body>
</html>
